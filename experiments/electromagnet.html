<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Iron Nail Electromagnet - Science Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F9F2;</text></svg>">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #0a0a1a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        #three-canvas { display: block; width: 100%; height: 100%; }

        /* UI Overlay */
        .ui-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
        }
        .ui-overlay > * { pointer-events: auto; }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 1rem; left: 1rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.3s;
            z-index: 20;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); }

        /* Title */
        .exp-title {
            position: fixed;
            top: 1rem; left: 50%; transform: translateX(-50%);
            font-family: 'Fredoka One', cursive;
            font-size: 1.3rem;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            z-index: 20;
            white-space: nowrap;
        }

        /* Control Panel */
        .control-panel {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 35, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 1.2rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95vw;
            z-index: 20;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }
        .control-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }
        .control-value {
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            color: #4A90D9;
        }

        /* Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.15);
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4A90D9;
            border: 3px solid #fff;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4A90D9;
            border: 3px solid #fff;
            cursor: pointer;
        }

        /* Power Switch */
        .power-switch {
            position: relative;
            width: 70px;
            height: 36px;
            cursor: pointer;
        }
        .power-switch input { display: none; }
        .switch-track {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.15);
            border-radius: 18px;
            transition: background 0.3s;
        }
        .power-switch input:checked + .switch-track {
            background: #4CAF50;
            box-shadow: 0 0 15px rgba(76,175,80,0.5);
        }
        .switch-knob {
            position: absolute;
            top: 3px; left: 3px;
            width: 30px; height: 30px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .power-switch input:checked ~ .switch-knob {
            transform: translateX(34px);
        }

        /* Info Display */
        .info-display {
            position: fixed;
            top: 1rem; right: 1rem;
            background: rgba(15, 15, 35, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 15px;
            padding: 1rem 1.2rem;
            font-size: 0.85rem;
            z-index: 20;
            min-width: 160px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.2rem 0;
        }
        .info-label { opacity: 0.6; }
        .info-val { font-weight: 700; color: #4A90D9; }
        .info-val.active { color: #4CAF50; }
        .info-val.inactive { color: #E86830; }

        /* Instruction hint */
        .hint {
            position: fixed;
            bottom: 7rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            opacity: 0.5;
            text-align: center;
            z-index: 20;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .exp-title { font-size: 1rem; top: 0.6rem; }
            .back-btn { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
            .control-panel {
                padding: 1rem;
                gap: 1rem;
                bottom: 0.8rem;
                border-radius: 16px;
            }
            input[type="range"] { width: 90px; }
            .info-display {
                top: auto;
                bottom: auto;
                top: 3.2rem;
                right: 0.5rem;
                padding: 0.7rem 0.9rem;
                font-size: 0.75rem;
                min-width: 130px;
            }
            .hint { bottom: 6rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div id="three-canvas"></div>

    <div class="ui-overlay">
        <a href="../index.html" class="back-btn">&larr; Back to Lab</a>

        <div class="exp-title">&#x1F9F2; The Iron Nail Electromagnet</div>

        <div class="info-display">
            <div class="info-row">
                <span class="info-label">Voltage</span>
                <span class="info-val" id="info-voltage">5V</span>
            </div>
            <div class="info-row">
                <span class="info-label">Coil Turns</span>
                <span class="info-val" id="info-turns">4</span>
            </div>
            <div class="info-row">
                <span class="info-label">Clips Picked</span>
                <span class="info-val" id="info-clips">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">Status</span>
                <span class="info-val inactive" id="info-status">OFF</span>
            </div>
        </div>

        <p class="hint">&#x1F5B1;&#xFE0F; Drag to rotate &bull; Scroll to zoom &bull; Pinch on mobile</p>

        <div class="control-panel">
            <div class="control-group">
                <span class="control-label">Voltage</span>
                <span class="control-value" id="voltage-display">5V</span>
                <input type="range" id="voltage-slider" min="1" max="10" value="5" step="1">
            </div>
            <div class="control-group">
                <span class="control-label">Coil Turns</span>
                <span class="control-value" id="turns-display">4</span>
                <input type="range" id="turns-slider" min="2" max="10" value="4" step="1">
            </div>
            <div class="control-group">
                <span class="control-label">Power</span>
                <label class="power-switch">
                    <input type="checkbox" id="power-switch">
                    <div class="switch-track"></div>
                    <div class="switch-knob"></div>
                </label>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Scene Setup ---
        const container = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 4, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 3;
        controls.maxDistance = 15;
        controls.maxPolarAngle = Math.PI * 0.85;
        controls.target.set(0, 1.2, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(1024, 1024);
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -8;
        dirLight.shadow.camera.right = 8;
        dirLight.shadow.camera.top = 8;
        dirLight.shadow.camera.bottom = -8;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x6688cc, 0.4);
        fillLight.position.set(-3, 4, -3);
        scene.add(fillLight);

        // Power indicator light (glow when ON)
        const powerLight = new THREE.PointLight(0x4CAF50, 0, 8);
        powerLight.position.set(0, 2.5, 0);
        scene.add(powerLight);

        // --- Materials ---
        const matTable = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.8, metalness: 0.05 });
        const matNail = new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.3, metalness: 0.85 });
        const matWire = new THREE.MeshStandardMaterial({ color: 0xCC6633, roughness: 0.4, metalness: 0.6 });
        const matBatteryRed = new THREE.MeshStandardMaterial({ color: 0xCC2222, roughness: 0.5, metalness: 0.2 });
        const matBatteryBlack = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.2 });
        const matBatteryTerminal = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, roughness: 0.3, metalness: 0.9 });
        const matClip = new THREE.MeshStandardMaterial({ color: 0xBBBBCC, roughness: 0.25, metalness: 0.9 });
        const matWireRed = new THREE.MeshStandardMaterial({ color: 0xCC3333, roughness: 0.5, metalness: 0.3 });
        const matWireBlack = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.3 });

        // --- Table ---
        const tableTop = new THREE.Mesh(
            new THREE.BoxGeometry(10, 0.3, 7),
            matTable
        );
        tableTop.position.y = -0.15;
        tableTop.receiveShadow = true;
        scene.add(tableTop);

        // Table legs
        const legGeo = new THREE.CylinderGeometry(0.15, 0.15, 2);
        const legPositions = [[-4.5, -1.15, -3], [4.5, -1.15, -3], [-4.5, -1.15, 3], [4.5, -1.15, 3]];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, matTable);
            leg.position.set(...pos);
            scene.add(leg);
        });

        // Grid helper (subtle)
        const gridHelper = new THREE.GridHelper(10, 20, 0x333355, 0x222244);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- Iron Nail ---
        const nailGroup = new THREE.Group();
        // Body
        const nailBody = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08, 0.08, 3, 16),
            matNail
        );
        nailBody.castShadow = true;
        nailBody.rotation.z = Math.PI / 2;
        nailGroup.add(nailBody);

        // Tip (cone)
        const nailTip = new THREE.Mesh(
            new THREE.ConeGeometry(0.08, 0.35, 16),
            matNail
        );
        nailTip.castShadow = true;
        nailTip.rotation.z = -Math.PI / 2;
        nailTip.position.x = 1.67;
        nailGroup.add(nailTip);

        // Head (flat disc)
        const nailHead = new THREE.Mesh(
            new THREE.CylinderGeometry(0.15, 0.15, 0.06, 16),
            matNail
        );
        nailHead.rotation.z = Math.PI / 2;
        nailHead.position.x = -1.53;
        nailGroup.add(nailHead);

        nailGroup.position.set(0, 1.5, 0);
        scene.add(nailGroup);

        // --- Wire Coil (dynamic) ---
        let coilMesh = null;

        function buildCoil(turns) {
            if (coilMesh) {
                scene.remove(coilMesh);
                coilMesh.geometry.dispose();
            }
            const points = [];
            const coilRadius = 0.22;
            const coilLength = Math.min(turns * 0.25, 2.4);
            const startX = -coilLength / 2;
            const totalSteps = turns * 32;

            for (let i = 0; i <= totalSteps; i++) {
                const t = i / totalSteps;
                const angle = t * turns * Math.PI * 2;
                const x = startX + t * coilLength;
                const y = Math.cos(angle) * coilRadius;
                const z = Math.sin(angle) * coilRadius;
                points.push(new THREE.Vector3(x, y, z));
            }

            // Lead wires extending from coil ends
            const lastPoint = points[points.length - 1];
            const firstPoint = points[0];
            // Wire going down from start
            for (let i = 1; i <= 8; i++) {
                points.unshift(new THREE.Vector3(firstPoint.x - i * 0.15, firstPoint.y - i * 0.12, firstPoint.z));
            }
            // Wire going down from end
            for (let i = 1; i <= 8; i++) {
                points.push(new THREE.Vector3(lastPoint.x + i * 0.15, lastPoint.y - i * 0.12, lastPoint.z));
            }

            const curve = new THREE.CatmullRomCurve3(points);
            const tubeGeo = new THREE.TubeGeometry(curve, totalSteps + 16, 0.03, 8, false);
            coilMesh = new THREE.Mesh(tubeGeo, matWire);
            coilMesh.castShadow = true;
            coilMesh.position.copy(nailGroup.position);
            scene.add(coilMesh);
        }

        buildCoil(4);

        // --- Battery ---
        const batteryGroup = new THREE.Group();

        // Main body - bottom half (black)
        const batteryBottom = new THREE.Mesh(
            new THREE.CylinderGeometry(0.35, 0.35, 0.8, 16),
            matBatteryBlack
        );
        batteryBottom.position.y = 0.4;
        batteryBottom.castShadow = true;
        batteryGroup.add(batteryBottom);

        // Main body - top half (red)
        const batteryTop = new THREE.Mesh(
            new THREE.CylinderGeometry(0.35, 0.35, 0.8, 16),
            matBatteryRed
        );
        batteryTop.position.y = 1.2;
        batteryTop.castShadow = true;
        batteryGroup.add(batteryTop);

        // + terminal
        const termPlus = new THREE.Mesh(
            new THREE.CylinderGeometry(0.1, 0.1, 0.15, 12),
            matBatteryTerminal
        );
        termPlus.position.y = 1.68;
        batteryGroup.add(termPlus);

        // - terminal (flat)
        const termMinus = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.2, 0.05, 12),
            matBatteryTerminal
        );
        termMinus.position.y = 0;
        batteryGroup.add(termMinus);

        batteryGroup.position.set(-3.5, 0, 0);
        scene.add(batteryGroup);

        // --- Connecting Wires (battery to coil leads) ---
        function createWire(from, to, material) {
            const mid = new THREE.Vector3(
                (from.x + to.x) / 2,
                Math.max(from.y, to.y) + 0.3,
                (from.z + to.z) / 2
            );
            const curve = new THREE.CatmullRomCurve3([from, mid, to]);
            const geo = new THREE.TubeGeometry(curve, 20, 0.025, 8, false);
            const mesh = new THREE.Mesh(geo, material);
            mesh.castShadow = true;
            scene.add(mesh);
            return mesh;
        }

        // Red wire: battery + terminal to coil start
        let wireRed = createWire(
            new THREE.Vector3(-3.5, 1.68, 0),
            new THREE.Vector3(-1.8, 0.5, 0),
            matWireRed
        );

        // Black wire: battery - terminal to coil end
        let wireBlack = createWire(
            new THREE.Vector3(-3.5, 0, 0),
            new THREE.Vector3(1.8, 0.5, 0),
            matWireBlack
        );

        // --- Paper Clips ---
        const TOTAL_CLIPS = 10;
        const clips = [];
        const clipRestPositions = [];
        const clipAttachedPositions = [];

        function createClipShape() {
            // Simple capsule-like paper clip
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.02, 0.18, 4, 8),
                matClip
            );
            body.castShadow = true;
            group.add(body);

            // Second parallel bar
            const bar2 = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.015, 0.12, 4, 8),
                matClip
            );
            bar2.position.x = 0.04;
            bar2.castShadow = true;
            group.add(bar2);

            return group;
        }

        for (let i = 0; i < TOTAL_CLIPS; i++) {
            const clip = createClipShape();
            // Scatter on table below nail tip
            const restX = 1.2 + Math.random() * 1.2;
            const restY = 0.12;
            const restZ = (Math.random() - 0.5) * 1.5;
            const restRotX = Math.random() * Math.PI;
            const restRotZ = Math.random() * Math.PI;

            clip.position.set(restX, restY, restZ);
            clip.rotation.set(restRotX, 0, restRotZ);
            scene.add(clip);
            clips.push({
                mesh: clip,
                restPos: new THREE.Vector3(restX, restY, restZ),
                restRot: new THREE.Euler(restRotX, 0, restRotZ),
                targetPos: new THREE.Vector3(restX, restY, restZ),
                targetRot: new THREE.Euler(restRotX, 0, restRotZ),
                attached: false,
            });

            // Pre-compute attached positions (clustered around nail tip)
            clipAttachedPositions.push(new THREE.Vector3(
                1.67 + (Math.random() - 0.5) * 0.15,
                1.5 + (Math.random() - 0.5) * 0.2,
                (Math.random() - 0.5) * 0.15
            ));
        }

        // --- State ---
        let powerOn = false;
        let voltage = 5;
        let coilTurns = 4;

        // --- UI Bindings ---
        const voltageSlider = document.getElementById('voltage-slider');
        const turnsSlider = document.getElementById('turns-slider');
        const powerSwitch = document.getElementById('power-switch');
        const voltageDisplay = document.getElementById('voltage-display');
        const turnsDisplay = document.getElementById('turns-display');
        const infoVoltage = document.getElementById('info-voltage');
        const infoTurns = document.getElementById('info-turns');
        const infoClips = document.getElementById('info-clips');
        const infoStatus = document.getElementById('info-status');

        voltageSlider.addEventListener('input', (e) => {
            voltage = parseInt(e.target.value);
            voltageDisplay.textContent = voltage + 'V';
            infoVoltage.textContent = voltage + 'V';
            updateClips();
        });

        turnsSlider.addEventListener('input', (e) => {
            coilTurns = parseInt(e.target.value);
            turnsDisplay.textContent = coilTurns;
            infoTurns.textContent = coilTurns;
            buildCoil(coilTurns);
            updateClips();
        });

        powerSwitch.addEventListener('change', (e) => {
            powerOn = e.target.checked;
            infoStatus.textContent = powerOn ? 'ON' : 'OFF';
            infoStatus.className = 'info-val ' + (powerOn ? 'active' : 'inactive');
            updateClips();
        });

        function updateClips() {
            const strength = powerOn ? (voltage * coilTurns) : 0;
            const maxStrength = 10 * 10; // max voltage * max turns
            const numAttracted = Math.floor((strength / maxStrength) * TOTAL_CLIPS);

            // Power light
            powerLight.intensity = powerOn ? 1.5 : 0;

            let clipsAttached = 0;
            for (let i = 0; i < TOTAL_CLIPS; i++) {
                const clip = clips[i];
                if (i < numAttracted && powerOn) {
                    clip.targetPos.copy(clipAttachedPositions[i]);
                    clip.targetRot.set(0, 0, Math.PI / 2);
                    clip.attached = true;
                    clipsAttached++;
                } else {
                    clip.targetPos.copy(clip.restPos);
                    clip.targetRot.copy(clip.restRot);
                    clip.attached = false;
                }
            }

            infoClips.textContent = clipsAttached;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);
            controls.update();

            // Animate clips towards targets
            for (const clip of clips) {
                const speed = clip.attached ? 5 : 3;
                clip.mesh.position.lerp(clip.targetPos, speed * dt);
                // Smooth rotation
                clip.mesh.rotation.x += (clip.targetRot.x - clip.mesh.rotation.x) * speed * dt;
                clip.mesh.rotation.y += (clip.targetRot.y - clip.mesh.rotation.y) * speed * dt;
                clip.mesh.rotation.z += (clip.targetRot.z - clip.mesh.rotation.z) * speed * dt;
            }

            // Subtle battery glow pulse when on
            if (powerOn) {
                const pulse = 1.2 + Math.sin(clock.elapsedTime * 3) * 0.3;
                powerLight.intensity = pulse;
            }

            renderer.render(scene, camera);
        }

        animate();

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
