<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nichrome Wire Heating Effect - Science Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F525;</text></svg>">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #0a0a1a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        #three-canvas { display: block; width: 100%; height: 100%; }

        .ui-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }
        .ui-overlay > * { pointer-events: auto; }

        .back-btn {
            position: fixed; top: 1rem; left: 1rem;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 0.6rem 1.2rem; border-radius: 50px;
            font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;
            transition: background 0.3s; z-index: 20;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); }

        .exp-title {
            position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
            font-family: 'Fredoka One', cursive; font-size: 1.3rem; text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5); z-index: 20; white-space: nowrap;
        }

        .control-panel {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 35, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
            padding: 1.2rem 1.8rem; display: flex; align-items: center; gap: 1.5rem;
            flex-wrap: wrap; justify-content: center; max-width: 95vw; z-index: 20;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
        .control-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
        .control-value { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: #E86830; }

        input[type="range"] {
            -webkit-appearance: none; appearance: none; width: 120px; height: 8px;
            border-radius: 4px; background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 24px; height: 24px;
            border-radius: 50%; background: #E86830; border: 3px solid #fff; cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 24px; height: 24px; border-radius: 50%;
            background: #E86830; border: 3px solid #fff; cursor: pointer;
        }

        .power-switch { position: relative; width: 70px; height: 36px; cursor: pointer; }
        .power-switch input { display: none; }
        .switch-track {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.15); border-radius: 18px; transition: background 0.3s;
        }
        .power-switch input:checked + .switch-track { background: #4CAF50; box-shadow: 0 0 15px rgba(76,175,80,0.5); }
        .switch-knob {
            position: absolute; top: 3px; left: 3px; width: 30px; height: 30px;
            background: #fff; border-radius: 50%; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .power-switch input:checked ~ .switch-knob { transform: translateX(34px); }

        /* Thermal toggle button */
        .thermal-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
        }
        .thermal-btn.active {
            background: rgba(232, 104, 48, 0.3);
            border-color: #E86830;
            color: #E86830;
        }

        .info-display {
            position: fixed; top: 1rem; right: 1rem;
            background: rgba(15, 15, 35, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 15px;
            padding: 1rem 1.2rem; font-size: 0.85rem; z-index: 20; min-width: 170px;
        }
        .info-row { display: flex; justify-content: space-between; gap: 1rem; padding: 0.2rem 0; }
        .info-label { opacity: 0.6; }
        .info-val { font-weight: 700; color: #E86830; }
        .info-val.active { color: #4CAF50; }
        .info-val.inactive { color: #E86830; }

        .temp-bar {
            margin-top: 0.5rem;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .temp-fill {
            height: 100%;
            border-radius: 4px;
            width: 0%;
            transition: width 0.5s ease, background 0.5s ease;
            background: #4A90D9;
        }

        .hint {
            position: fixed; bottom: 7rem; left: 50%; transform: translateX(-50%);
            font-size: 0.8rem; opacity: 0.5; text-align: center; z-index: 20; white-space: nowrap;
        }

        @media (max-width: 600px) {
            .exp-title { font-size: 1rem; top: 0.6rem; }
            .back-btn { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
            .control-panel { padding: 1rem; gap: 1rem; bottom: 0.8rem; border-radius: 16px; }
            input[type="range"] { width: 90px; }
            .info-display { top: 3.2rem; right: 0.5rem; padding: 0.7rem 0.9rem; font-size: 0.75rem; min-width: 130px; }
            .hint { bottom: 6rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div id="three-canvas"></div>

    <div class="ui-overlay">
        <a href="../index.html" class="back-btn">&larr; Back to Lab</a>
        <div class="exp-title">&#x1F525; Nichrome Wire Heater</div>

        <div class="info-display">
            <div class="info-row">
                <span class="info-label">Voltage</span>
                <span class="info-val" id="info-voltage">5V</span>
            </div>
            <div class="info-row">
                <span class="info-label">Temperature</span>
                <span class="info-val" id="info-temp">25&deg;C</span>
            </div>
            <div class="info-row">
                <span class="info-label">Status</span>
                <span class="info-val inactive" id="info-status">OFF</span>
            </div>
            <div class="temp-bar">
                <div class="temp-fill" id="temp-fill"></div>
            </div>
        </div>

        <p class="hint">&#x1F5B1;&#xFE0F; Drag to rotate &bull; Scroll to zoom &bull; Toggle thermal view!</p>

        <div class="control-panel">
            <div class="control-group">
                <span class="control-label">Voltage</span>
                <span class="control-value" id="voltage-display">5V</span>
                <input type="range" id="voltage-slider" min="1" max="10" value="5" step="1">
            </div>
            <div class="control-group">
                <span class="control-label">Power</span>
                <label class="power-switch">
                    <input type="checkbox" id="power-switch">
                    <div class="switch-track"></div>
                    <div class="switch-knob"></div>
                </label>
            </div>
            <div class="control-group">
                <span class="control-label">View</span>
                <button class="thermal-btn" id="thermal-btn">&#x1F321;&#xFE0F; Thermal</button>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Scene ---
        const container = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(3, 3, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 2;
        controls.maxDistance = 10;
        controls.maxPolarAngle = Math.PI * 0.85;
        controls.target.set(0, 0.8, 0);

        // --- Lighting ---
        scene.add(new THREE.AmbientLight(0x404060, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(1024, 1024);
        scene.add(dirLight);
        const fillLight = new THREE.DirectionalLight(0x6688cc, 0.4);
        fillLight.position.set(-3, 4, -3);
        scene.add(fillLight);

        // Glow light centered on wire
        const glowLight = new THREE.PointLight(0xFF6600, 0, 5);
        glowLight.position.set(0, 0.9, 0);
        scene.add(glowLight);

        // --- Materials ---
        const matTable = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.8, metalness: 0.05 });
        const matCardboard = new THREE.MeshStandardMaterial({ color: 0xC4A265, roughness: 0.9, metalness: 0.0 });
        const matNail = new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.3, metalness: 0.85 });
        const matWire = new THREE.MeshStandardMaterial({
            color: 0x888888,
            roughness: 0.4,
            metalness: 0.7,
            emissive: 0x000000,
            emissiveIntensity: 0,
        });
        const matBatteryRed = new THREE.MeshStandardMaterial({ color: 0xCC2222, roughness: 0.5, metalness: 0.2 });
        const matBatteryBlack = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.2 });
        const matTerminal = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, roughness: 0.3, metalness: 0.9 });
        const matWireRed = new THREE.MeshStandardMaterial({ color: 0xCC3333, roughness: 0.5, metalness: 0.3 });
        const matWireBlack = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.3 });

        // --- Table ---
        const tableTop = new THREE.Mesh(new THREE.BoxGeometry(8, 0.3, 6), matTable);
        tableTop.position.y = -0.15;
        tableTop.receiveShadow = true;
        scene.add(tableTop);

        const gridHelper = new THREE.GridHelper(8, 16, 0x333355, 0x222244);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- Cardboard Base ---
        const cardboard = new THREE.Mesh(
            new THREE.BoxGeometry(3.5, 0.08, 1.5),
            matCardboard
        );
        cardboard.position.set(0, 0.04, 0);
        cardboard.receiveShadow = true;
        cardboard.castShadow = true;
        scene.add(cardboard);

        // --- Two nails as wire holders ---
        function makeNail(x) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.05, 0.05, 0.8, 12),
                matNail
            );
            body.position.y = 0.4;
            body.castShadow = true;
            group.add(body);

            const head = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.1, 0.04, 12),
                matNail
            );
            head.position.y = 0.82;
            group.add(head);

            const tip = new THREE.Mesh(
                new THREE.ConeGeometry(0.05, 0.15, 12),
                matNail
            );
            tip.position.y = -0.02;
            tip.rotation.x = Math.PI;
            group.add(tip);

            group.position.set(x, 0.08, 0);
            scene.add(group);
            return group;
        }

        const nailLeft = makeNail(-1.2);
        const nailRight = makeNail(1.2);

        // --- Nichrome Wire (stretched between nails) ---
        const nichromeGeo = new THREE.CylinderGeometry(0.02, 0.02, 2.4, 12);
        const nichromeMesh = new THREE.Mesh(nichromeGeo, matWire);
        nichromeMesh.rotation.z = Math.PI / 2;
        nichromeMesh.position.set(0, 0.88, 0);
        nichromeMesh.castShadow = true;
        scene.add(nichromeMesh);

        // --- Battery ---
        const batteryGroup = new THREE.Group();
        const batBot = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.7, 16), matBatteryBlack);
        batBot.position.y = 0.35; batBot.castShadow = true;
        batteryGroup.add(batBot);
        const batTop = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.7, 16), matBatteryRed);
        batTop.position.y = 1.05; batTop.castShadow = true;
        batteryGroup.add(batTop);
        const tPlus = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.12, 12), matTerminal);
        tPlus.position.y = 1.46;
        batteryGroup.add(tPlus);
        batteryGroup.position.set(-3, 0, 0);
        scene.add(batteryGroup);

        // Connecting wires
        function makeCurveWire(from, to, mat) {
            const mid = new THREE.Vector3((from.x + to.x) / 2, Math.max(from.y, to.y) + 0.3, (from.z + to.z) / 2);
            const c = new THREE.CatmullRomCurve3([from, mid, to]);
            const g = new THREE.TubeGeometry(c, 20, 0.025, 8, false);
            const m = new THREE.Mesh(g, mat);
            m.castShadow = true;
            scene.add(m);
        }
        makeCurveWire(new THREE.Vector3(-3, 1.46, 0), new THREE.Vector3(-1.2, 0.88, 0), matWireRed);
        makeCurveWire(new THREE.Vector3(-3, 0, 0), new THREE.Vector3(1.2, 0.88, 0), matWireBlack);

        // --- Heat Particles (rising from wire when hot) ---
        const heatParticles = [];
        const HEAT_PARTICLE_COUNT = 30;

        for (let i = 0; i < HEAT_PARTICLE_COUNT; i++) {
            const geo = new THREE.SphereGeometry(0.02 + Math.random() * 0.02, 6, 6);
            const mat = new THREE.MeshBasicMaterial({
                color: 0xFF6600,
                transparent: true,
                opacity: 0,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.visible = false;
            scene.add(mesh);
            heatParticles.push({
                mesh,
                baseX: -1.1 + Math.random() * 2.2,
                y: 0,
                speed: 0.3 + Math.random() * 0.5,
                drift: (Math.random() - 0.5) * 0.3,
                phase: Math.random() * Math.PI * 2,
            });
        }

        // --- State ---
        let powerOn = false;
        let voltage = 5;
        let thermalView = false;
        let currentTemp = 25; // degrees C
        let targetTemp = 25;

        // Temperature color gradient (thermal camera style)
        function getThermalColor(t) {
            // t: 0 (cold/blue) to 1 (hot/red)
            if (t < 0.25) {
                return new THREE.Color(0x0000FF).lerp(new THREE.Color(0x00FFFF), t / 0.25);
            } else if (t < 0.5) {
                return new THREE.Color(0x00FFFF).lerp(new THREE.Color(0x00FF00), (t - 0.25) / 0.25);
            } else if (t < 0.75) {
                return new THREE.Color(0x00FF00).lerp(new THREE.Color(0xFFFF00), (t - 0.5) / 0.25);
            } else {
                return new THREE.Color(0xFFFF00).lerp(new THREE.Color(0xFF0000), (t - 0.75) / 0.25);
            }
        }

        // Wire heating color (normal view)
        function getHeatColor(t) {
            if (t < 0.3) return new THREE.Color(0x888888);
            if (t < 0.5) return new THREE.Color(0x888888).lerp(new THREE.Color(0xCC4400), (t - 0.3) / 0.2);
            if (t < 0.7) return new THREE.Color(0xCC4400).lerp(new THREE.Color(0xFF6600), (t - 0.5) / 0.2);
            return new THREE.Color(0xFF6600).lerp(new THREE.Color(0xFF3300), (t - 0.7) / 0.3);
        }

        // Saved original colors for thermal toggle
        const originalBg = new THREE.Color(0x1a1a2e);
        const thermalBg = new THREE.Color(0x0a0a2a);

        // --- UI ---
        const voltageSlider = document.getElementById('voltage-slider');
        const powerSwitchEl = document.getElementById('power-switch');
        const thermalBtn = document.getElementById('thermal-btn');
        const voltageDisplay = document.getElementById('voltage-display');
        const infoVoltage = document.getElementById('info-voltage');
        const infoTemp = document.getElementById('info-temp');
        const infoStatus = document.getElementById('info-status');
        const tempFill = document.getElementById('temp-fill');

        voltageSlider.addEventListener('input', (e) => {
            voltage = parseInt(e.target.value);
            voltageDisplay.textContent = voltage + 'V';
            infoVoltage.textContent = voltage + 'V';
            updateState();
        });

        powerSwitchEl.addEventListener('change', (e) => {
            powerOn = e.target.checked;
            infoStatus.textContent = powerOn ? 'ON' : 'OFF';
            infoStatus.className = 'info-val ' + (powerOn ? 'active' : 'inactive');
            updateState();
        });

        thermalBtn.addEventListener('click', () => {
            thermalView = !thermalView;
            thermalBtn.classList.toggle('active', thermalView);
        });

        function updateState() {
            if (powerOn) {
                targetTemp = 25 + (voltage / 10) * 975; // 25 to 1000 degrees
            } else {
                targetTemp = 25;
            }
        }

        // --- Animation ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);
            const elapsed = clock.elapsedTime;
            controls.update();

            // Smooth temperature change
            const tempSpeed = powerOn ? 3 : 1.5;
            currentTemp += (targetTemp - currentTemp) * tempSpeed * dt;

            // Normalized heat level (0 = room temp, 1 = max)
            const heatLevel = Math.max(0, (currentTemp - 25) / 975);

            // Update wire appearance
            if (thermalView) {
                const thermalColor = getThermalColor(heatLevel);
                matWire.color.copy(thermalColor);
                matWire.emissive.copy(thermalColor);
                matWire.emissiveIntensity = 0.3 + heatLevel * 0.7;
                scene.background.copy(thermalBg);
            } else {
                const heatColor = getHeatColor(heatLevel);
                matWire.color.copy(heatColor);
                matWire.emissive.copy(heatLevel > 0.2 ? heatColor : new THREE.Color(0x000000));
                matWire.emissiveIntensity = heatLevel * 1.5;
                scene.background.copy(originalBg);
            }

            // Glow light
            glowLight.intensity = heatLevel * 3;
            glowLight.color.copy(getHeatColor(heatLevel));

            // Heat particles
            const showParticles = heatLevel > 0.15;
            const particleCount = Math.floor(heatLevel * HEAT_PARTICLE_COUNT);

            heatParticles.forEach((p, i) => {
                if (i < particleCount && showParticles) {
                    p.mesh.visible = true;
                    p.y += p.speed * dt;
                    if (p.y > 1.5) {
                        p.y = 0;
                        p.baseX = -1.1 + Math.random() * 2.2;
                    }
                    const wobble = Math.sin(elapsed * 2 + p.phase) * p.drift;
                    p.mesh.position.set(
                        p.baseX + wobble,
                        0.95 + p.y,
                        (Math.random() - 0.5) * 0.1
                    );
                    const fadeOut = 1 - (p.y / 1.5);
                    p.mesh.material.opacity = fadeOut * heatLevel * 0.8;

                    // Color based on view mode
                    if (thermalView) {
                        p.mesh.material.color.setHex(0xFF4400);
                    } else {
                        const pColor = heatLevel > 0.5 ? 0xFF3300 : 0xFF6600;
                        p.mesh.material.color.setHex(pColor);
                    }
                } else {
                    p.mesh.visible = false;
                }
            });

            // Update info display
            infoTemp.textContent = Math.round(currentTemp) + '\u00B0C';

            // Temperature bar
            const barPercent = Math.min(heatLevel * 100, 100);
            tempFill.style.width = barPercent + '%';
            if (heatLevel < 0.3) {
                tempFill.style.background = '#4A90D9';
            } else if (heatLevel < 0.6) {
                tempFill.style.background = '#E8A830';
            } else {
                tempFill.style.background = '#E83030';
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
